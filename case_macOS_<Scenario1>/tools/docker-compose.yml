services:
  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: opensearch
    platform: linux/amd64
    environment:
      - discovery.type=single-node
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - node.store.allow_mmap=false
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  postgres:
    image: postgres:14
    container_name: timesketch-postgres
    environment:
      POSTGRES_USER: timesketch
      POSTGRES_PASSWORD: timesketch
      POSTGRES_DB: timesketch
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timesketch -d timesketch >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7
    container_name: timesketch-redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 30

  timesketch-init:
    image: us-docker.pkg.dev/osdfir-registry/timesketch/timesketch:latest
    container_name: timesketch-init
    platform: linux/amd64
    depends_on:
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - FLASK_APP=timesketch.app:create_app
    volumes:
      - ./config/timesketch.conf:/etc/timesketch.conf:ro
      - ./logs:/var/log/timesketch
      - ./cases:/cases
      # Mount only the image folder so the file path is /evidence/poc_image.dd
      - ./evidence/image:/evidence:ro
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "
      set -e
      mkdir -p /var/log/timesketch /cases/uploads
      tsctl --help >/dev/null
      echo '[init] OK'
      "
    restart: "no"

  timesketch-web:
    image: us-docker.pkg.dev/osdfir-registry/timesketch/timesketch:latest
    container_name: timesketch-web
    platform: linux/amd64
    command: timesketch-web
    ports:
      - "8080:5000"
    depends_on:
      timesketch-init:
        condition: service_completed_successfully
    environment:
      - FLASK_APP=timesketch.app:create_app
    volumes:
      - ./config/timesketch.conf:/etc/timesketch.conf:ro
      - ./logs:/var/log/timesketch
      - ./cases:/cases
      - ./evidence/image:/evidence:ro
    restart: unless-stopped

  timesketch-worker:
    image: us-docker.pkg.dev/osdfir-registry/timesketch/timesketch:latest
    container_name: timesketch-worker
    platform: linux/amd64
    command: timesketch-worker
    depends_on:
      timesketch-web:
        condition: service_started
    environment:
      - FLASK_APP=timesketch.app:create_app
    volumes:
      - ./config/timesketch.conf:/etc/timesketch.conf:ro
      - ./logs:/var/log/timesketch
      - ./cases:/cases
      - ./evidence/image:/evidence:ro
    restart: unless-stopped

  plaso:
    image: log2timeline/plaso:latest
    container_name: plaso
    platform: linux/amd64
    volumes:
      - ./cases:/cases
      - ./evidence/image:/evidence:ro
    entrypoint: ["/bin/bash"]
    tty: true

  sleuthkit:
    image: kalilinux/kali-rolling
    container_name: sleuthkit
    platform: linux/amd64
    volumes:
      - ./cases:/cases
      - ./evidence/image:/evidence:ro
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "apt-get update &&
       apt-get install -y sleuthkit &&
       touch ~/.hushlogin &&
       echo 'Sleuth Kit Ready' &&
       sleep infinity"
    tty: true

  velociraptor:
    image: wlambert/velociraptor:latest
    container_name: velociraptor
    platform: linux/amd64
    ports:
      - "8889:8889"
      - "8000:8000"
    volumes:
      - ./config/velociraptor:/config
      - ./cases:/cases
      - ./evidence/image:/evidence:ro
    restart: unless-stopped


  
volumes:
  opensearch-data:
  postgres-data:

